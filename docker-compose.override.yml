# ============================================================
# World Monitor — deploy override (server)  [tracked, no secrets]
# ============================================================
# Wires EVERY variable from `.env` into both containers via `env_file`, so any
# API key / credential you add to `.env` later takes effect on the next
# `docker compose up -d` with NO further wiring. Put actual values in `.env`
# (gitignored) next to this file on the server.
#
# Base docker-compose.yml's explicit `environment:` entries still win where they
# overlap (e.g. the internal Redis URL/token), so env_file can't clobber them.
#
# NOTE: VITE_* flags are BUILD-TIME (baked into the frontend at build), not
# runtime env — they cannot be enabled this way. The frontend is built/served by
# Cloudflare Pages in this split deploy, so set VITE_* in the Pages build env.
# ============================================================

services:
  worldmonitor:
    env_file:
      - .env
    environment:
      # Keep production mode OFF by default. NODE_ENV=production drops localhost
      # from the CORS allowlist, which 403s the app's own internal /api calls in
      # this self-hosted layout (see git history). .env can still set it if ever
      # needed; this just provides the safe default when .env omits it.
      NODE_ENV: "${NODE_ENV:-}"

  ais-relay:
    env_file:
      - .env
